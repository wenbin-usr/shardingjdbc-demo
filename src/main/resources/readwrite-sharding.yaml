# ShardingSphere-JDBC 读写分离示例（与 App.java 中连接信息、规则语义一致）
# 文档：https://shardingsphere.apache.org/document/5.5.2/en/user-manual/shardingsphere-jdbc/yaml-config/

databaseName: readwrite_demo

mode:
  type: Standalone
  repository:
    type: JDBC

dataSources:
  ds_master:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://1.15.233.144:3307/db_test?serverTimezone=UTC&useSSL=false
    username: root
    password: "123456"
  ds_slave1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://1.15.233.144:3308/db_test?serverTimezone=UTC&useSSL=false
    username: root
    password: "123456"
  ds_slave2:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://1.15.233.144:3309/db_test?serverTimezone=UTC&useSSL=false
    username: root
    password: "123456"

rules:
  # 5.4+ 单表需显式加载，否则 TableNotFoundException
  - !SINGLE
    tables:
      - "*.*"
    defaultDataSource: ds_master
  - !READWRITE_SPLITTING
    dataSourceGroups:
      ds_readwrite:
        writeDataSourceName: ds_master
        readDataSourceNames:
          - ds_slave1
          - ds_slave2
        loadBalancerName: demo_weight_lb
    loadBalancers:
      demo_weight_lb:
        type: WEIGHT
        props:
          ds_slave1: 1
          ds_slave2: 2

props:
  sql-show: true
